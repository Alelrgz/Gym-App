<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0a; color: #e5e5e5; min-height: 100vh; }

  .header { background: #111; border-bottom: 1px solid #222; padding: 20px 32px; position: sticky; top: 0; z-index: 100; display: flex; align-items: center; gap: 16px; }
  .header h1 { font-size: 20px; font-weight: 800; color: #f97316; }
  .header .subtitle { font-size: 12px; color: #666; }
  .progress-bar { flex: 1; max-width: 300px; height: 6px; background: #222; border-radius: 3px; overflow: hidden; margin-left: auto; }
  .progress-fill { height: 100%; background: #f97316; border-radius: 3px; transition: width 0.3s; }
  .progress-text { font-size: 12px; color: #888; font-weight: 600; min-width: 50px; text-align: right; }
  .btn-reset { background: #222; color: #888; border: 1px solid #333; padding: 6px 14px; border-radius: 8px; font-size: 11px; cursor: pointer; font-weight: 600; }
  .btn-reset:hover { background: #333; color: #ccc; }

  .container { max-width: 900px; margin: 0 auto; padding: 24px; }

  .tabs { display: flex; gap: 4px; margin-bottom: 24px; flex-wrap: wrap; }
  .tab { padding: 8px 16px; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; background: #161616; color: #666; border: 1px solid #222; transition: all 0.2s; }
  .tab:hover { background: #1a1a1a; color: #999; }
  .tab.active { background: #f97316; color: #fff; border-color: #f97316; }
  .tab .count { font-size: 10px; opacity: 0.7; margin-left: 4px; }

  .section { display: none; }
  .section.active { display: block; }

  .role-group { margin-bottom: 32px; }
  .role-title { font-size: 16px; font-weight: 700; color: #f97316; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
  .role-subtitle { font-size: 11px; color: #555; margin-bottom: 16px; }

  .category { margin-bottom: 20px; }
  .category-header { font-size: 13px; font-weight: 700; color: #999; letter-spacing: 0.5px; margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid #1a1a1a; cursor: pointer; display: flex; align-items: center; gap: 6px; }
  .category-header .arrow { transition: transform 0.2s; font-size: 10px; color: #555; }
  .category-header .arrow.collapsed { transform: rotate(-90deg); }
  .category-header .cat-progress { margin-left: auto; font-size: 10px; color: #555; font-weight: 500; }

  .checklist { list-style: none; }
  .checklist.collapsed { display: none; }
  .check-item { display: flex; align-items: flex-start; gap: 10px; padding: 7px 8px; border-radius: 8px; transition: background 0.15s; }
  .check-item:hover { background: #161616; }
  .check-item input[type="checkbox"] { appearance: none; width: 18px; height: 18px; border: 2px solid #333; border-radius: 5px; cursor: pointer; flex-shrink: 0; margin-top: 1px; position: relative; transition: all 0.15s; }
  .check-item input[type="checkbox"]:checked { background: #f97316; border-color: #f97316; }
  .check-item input[type="checkbox"]:checked::after { content: '✓'; position: absolute; top: -1px; left: 2px; font-size: 12px; color: #fff; font-weight: 700; }
  .check-item label { font-size: 13px; color: #ccc; cursor: pointer; line-height: 1.4; }
  .check-item.checked label { color: #555; text-decoration: line-through; }
  .badge { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 9px; font-weight: 700; margin-left: 6px; vertical-align: middle; }
  .badge.mobile { background: #3b82f620; color: #60a5fa; }
  .badge.desktop { background: #8b5cf620; color: #a78bfa; }
  .badge.both { background: #f9731620; color: #f97316; }

  .platform-filter { display: flex; gap: 6px; margin-left: 16px; }
  .platform-btn { padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 600; cursor: pointer; background: #161616; color: #666; border: 1px solid #222; }
  .platform-btn.active { background: #222; color: #ccc; border-color: #444; }

  @media (max-width: 640px) {
    .header { padding: 16px; flex-wrap: wrap; gap: 8px; }
    .container { padding: 16px; }
    .tabs { gap: 4px; }
    .tab { padding: 6px 12px; font-size: 12px; }
  }
</style>

// State
let activeTab = 'Client';
let checkedItems = JSON.parse(localStorage.getItem('hf-checklist') || '{}');

function save() {
  localStorage.setItem('hf-checklist', JSON.stringify(checkedItems));
}

function getKey(role, cat, idx) {
  return `${role}::${cat}::${idx}`;
}

function renderTabs() {
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = '';
  for (const [role, data] of Object.entries(DATA)) {
    const totalItems = Object.values(data.categories).reduce((sum, cat) => sum + cat.items.length, 0);
    const checkedCount = Object.values(data.categories).reduce((sum, cat) => {
      return sum + cat.items.filter((_, i) => checkedItems[getKey(role, Object.keys(data.categories)[Object.values(data.categories).indexOf(cat)], i)]).length;
    }, 0);

    let checked = 0;
    for (const [catName, cat] of Object.entries(data.categories)) {
      cat.items.forEach((_, i) => { if (checkedItems[getKey(role, catName, i)]) checked++; });
    }

    const tab = document.createElement('div');
    tab.className = `tab ${role === activeTab ? 'active' : ''}`;
    tab.innerHTML = `${data.icon} ${role} <span class="count">${checked}/${totalItems}</span>`;
    tab.onclick = () => { activeTab = role; render(); };
    tabsEl.appendChild(tab);
  }
}

function render() {
  renderTabs();
  const sectionsEl = document.getElementById('sections');
  sectionsEl.innerHTML = '';

  for (const [role, data] of Object.entries(DATA)) {
    const section = document.createElement('div');
    section.className = `section ${role === activeTab ? 'active' : ''}`;

    let html = `<div class="role-group">
      <div class="role-title">${data.icon} ${role}</div>
      <div class="role-subtitle">${data.subtitle}</div>`;

    for (const [catName, cat] of Object.entries(data.categories)) {
      const catChecked = cat.items.filter((_, i) => checkedItems[getKey(role, catName, i)]).length;
      html += `<div class="category">
        <div class="category-header" onclick="toggleCategory(this)">
          <span class="arrow">▼</span> ${catName}
          <span class="cat-progress">${catChecked}/${cat.items.length}</span>
        </div>
        <ul class="checklist">`;

      cat.items.forEach(([label, platform], i) => {
        const key = getKey(role, catName, i);
        const isChecked = !!checkedItems[key];
        const badgeClass = platform === 'mobile' ? 'mobile' : platform === 'desktop' ? 'desktop' : 'both';
        const badgeLabel = platform === 'mobile' ? 'MOB' : platform === 'desktop' ? 'DSK' : 'ALL';
        html += `<li class="check-item ${isChecked ? 'checked' : ''}">
          <input type="checkbox" id="${key}" ${isChecked ? 'checked' : ''} onchange="toggle('${key}')">
          <label for="${key}">${label} <span class="badge ${badgeClass}">${badgeLabel}</span></label>
        </li>`;
      });

      html += `</ul></div>`;
    }

    html += `</div>`;
    section.innerHTML = html;
    sectionsEl.appendChild(section);
  }

  updateGlobalProgress();
}

function toggle(key) {
  checkedItems[key] = !checkedItems[key];
  if (!checkedItems[key]) delete checkedItems[key];
  save();
  render();
}

function toggleCategory(el) {
  const arrow = el.querySelector('.arrow');
  const list = el.nextElementSibling;
  arrow.classList.toggle('collapsed');
  list.classList.toggle('collapsed');
}

function updateGlobalProgress() {
  let total = 0, checked = 0;
  for (const [role, data] of Object.entries(DATA)) {
    for (const [catName, cat] of Object.entries(data.categories)) {
      total += cat.items.length;
      cat.items.forEach((_, i) => { if (checkedItems[getKey(role, catName, i)]) checked++; });
    }
  }
  const pct = total > 0 ? Math.round((checked / total) * 100) : 0;
  document.getElementById('globalProgress').style.width = pct + '%';
  document.getElementById('globalProgressText').textContent = `${checked}/${total}`;
}

function resetAll() {
  if (!confirm('Reset all checkboxes? This cannot be undone.')) return;
  checkedItems = {};
  save();
  render();
}

render();
